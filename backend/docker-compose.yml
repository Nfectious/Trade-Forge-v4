services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env.production          # ← This line is key. Points to root .env.production
    # volumes, restart, etc.

  # frontend is served separately (Next.js dev server or static export)
  # and does not run as a Docker service in this compose file.
